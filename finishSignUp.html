<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入驗證中 · 英語閱讀</title>
  <base href="/eng-reading-panel/">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #f3f4f6 0%, #e5e7eb 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .verify-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 48px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.5);
      text-align: center;
    }

    .icon {
      font-size: 48px;
      color: #4f46e5;
      background: white;
      width: 80px;
      height: 80px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 10px 20px -10px rgba(79, 70, 229, 0.3);
    }

    h2 {
      font-size: 24px;
      color: #1f2937;
      margin-bottom: 12px;
    }

    p {
      color: #6b7280;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .spinner {
      border: 3px solid #f3f4f6;
      border-top: 3px solid #4f46e5;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .message {
      padding: 16px;
      border-radius: 40px;
      margin: 20px 0;
      display: none;
    }

    .message.success {
      background: #dcfce7;
      color: #059669;
      display: block;
    }

    .message.error {
      background: #fee2e2;
      color: #dc2626;
      display: block;
    }

    .btn {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 40px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
      margin-top: 20px;
    }

    .btn:hover {
      background: #4338ca;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
    }
  </style>
</head>
<body>
  <div class="verify-card">
    <div class="icon">
      <i class="fas fa-envelope"></i>
    </div>
    <h2>處理登入請求</h2>
    <p>請稍候，我們正在驗證你的登入連結</p>
    
    <div class="spinner" id="spinner"></div>
    
    <div class="message" id="message"></div>
    
    <a href="/eng-reading-f1-new_treasure_plus/login.html" class="btn" id="backBtn" style="display: none;">
      <i class="fas fa-arrow-left"></i> 返回登入頁
    </a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { 
      getAuth, 
      isSignInWithEmailLink, 
      signInWithEmailLink 
    } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBwvsGR126V-_yNR9ZafSwNtp_lfS6jYFQ",
      authDomain: "eng-read-mb-f1-newtreasureplus.firebaseapp.com",
      projectId: "eng-read-mb-f1-newtreasureplus",
      storageBucket: "eng-read-mb-f1-newtreasureplus.firebasestorage.app",
      messagingSenderId: "609164976857",
      appId: "1:609164976857:web:647920c68d2aaa0d47d4c8",
      measurementId: "G-B6GRLE9Y57"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const spinner = document.getElementById('spinner');
    const message = document.getElementById('message');
    const backBtn = document.getElementById('backBtn');

    async function handleEmailLink() {
      // 確認是 Email Link 登入
      if (!isSignInWithEmailLink(auth, window.location.href)) {
        spinner.style.display = 'none';
        message.className = 'message error';
        message.textContent = '無效的登入連結';
        backBtn.style.display = 'inline-block';
        return;
      }

      // 從 localStorage 取得 Email
      let email = window.localStorage.getItem('emailForSignIn');

      if (!email) {
        // 如果沒有儲存，請用戶輸入
        email = window.prompt('請輸入您的 Email 以完成登入');
        if (!email) {
          spinner.style.display = 'none';
          message.className = 'message error';
          message.textContent = '登入已取消';
          backBtn.style.display = 'inline-block';
          return;
        }
      }

      try {
        // 完成登入
        const result = await signInWithEmailLink(auth, email, window.location.href);
        
        // 登入成功，清除儲存的 Email
        window.localStorage.removeItem('emailForSignIn');
        
        // 顯示成功訊息
        spinner.style.display = 'none';
        message.className = 'message success';
        message.textContent = '✅ 登入成功！即將跳轉...';
        
        // 3 秒後跳轉到首頁
        setTimeout(() => {
          window.location.href = '/eng-reading-panel/index.html';
        }, 3000);
        
      } catch (error) {
        console.error('登入失敗:', error);
        spinner.style.display = 'none';
        message.className = 'message error';
        message.textContent = '登入失敗：' + error.message;
        backBtn.style.display = 'inline-block';
      }
    }

    // 執行
    handleEmailLink();
  </script>
</body>
</html>
